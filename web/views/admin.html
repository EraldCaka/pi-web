<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Web — Admin</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
    Pi Web
  </div>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/admin" class="nav-link active">Admin</a>
  </div>
  <div class="nav-user">
    <span class="badge badge-admin">admin</span>
    <span style="font-size:.8rem;color:var(--muted)">{{.Email}}</span>
    <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">User Management</div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </span>
    </div>
    <div class="table-wrap"
         id="users-table"
         hx-get="/fragments/users"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="skeleton" style="margin-bottom:.5rem"></div>
      <div class="skeleton" style="width:80%;margin-bottom:.5rem"></div>
      <div class="skeleton" style="width:60%"></div>
    </div>
  </div>
</div>

</body>
</html>
